# Example multi-camera rig configuration.
#
# `cameras:` (a list) replaces the single `camera:` mapping; each entry
# takes the same keys plus:
#   name         -- label shown in the viewer/CLI output
#   yaw_offset   -- mounting direction relative to travel [deg, CCW+]
#   pitch_offset -- mounting tilt [deg, up+]
# Coverage counts a light seen by ANY camera; redundancy counts every
# (camera, head) observation, so the same head seen by two cameras is
# two independent observations.
#
# Usage: python3 webapp.py --config camera_spec_multi.yaml

map: lanelet2_map.osm
output: fov_coverage_result_multi.png
signal_type: vehicle

cameras:
  - name: front_tele
    height: 3.0
    fov_h: 30.0
    fov_v: 17.0
    min_range: 20.0
    max_range: 250.0
    facing_tolerance_deg: 45.0
  - name: front_wide
    height: 3.0
    fov_h: 90.0
    fov_v: 50.0
    min_range: 3.0
    max_range: 80.0
    facing_tolerance_deg: 45.0
